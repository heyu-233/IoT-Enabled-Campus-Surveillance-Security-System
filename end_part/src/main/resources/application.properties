spring.application.name=end_part
server.port=8081
server.servlet.context-path=/api

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/qgg_backend?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.example.end_part.entity

jwt.secret=${JWT_SECRET:replace-with-your-own-jwt-secret}
jwt.expiration=${JWT_EXPIRATION:86400}

logging.level.com.example.end_part=DEBUG

mqtt.broker.url=${MQTT_BROKER_URL:tcp://127.0.0.1:1883}
mqtt.client.id=${MQTT_CLIENT_ID:backend-client}
mqtt.topic.sensors=sensors/+
mqtt.topic.alerts=alerts/+
mqtt.topic.edge=edge/#
mqtt.topic.buzzer=edge/buzzer/on
mqtt.username=${MQTT_USERNAME:}
mqtt.password=${MQTT_PASSWORD:}
mqtt.qos=1
mqtt.connection.timeout=30
mqtt.keep.alive.interval=60
detector.supervisor.base-url=${DETECTOR_SUPERVISOR_BASE_URL:http://127.0.0.1:19090}

logging.level.org.springframework.integration.mqtt=DEBUG
logging.level.org.eclipse.paho=INFO
logging.level.org.springframework.integration=DEBUG

image.upload.path=${IMAGE_UPLOAD_PATH:./uploads/images}
image.access.url=${IMAGE_ACCESS_URL:/images}
alert.auto.threshold=${ALERT_AUTO_THRESHOLD:0.5}
